<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page not found</title>
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            background-color: #2c2c2c;
            color: #fafafa;
            display: grid;
            place-content: center;
        }

        main {
            font-family: sans-serif;
            text-align: center;
            padding: 0 1rem;
            user-select: none;
        }

        h1 {
            font-size: 4rem;

        }

        h2 {
            font-size: 2rem;
            font-weight: 400;
        }
    </style>
</head>

<body>
    <main>
        <h1>404</h1>
        <h2>Page not found</h2>
    </main>
</body>

</html>
